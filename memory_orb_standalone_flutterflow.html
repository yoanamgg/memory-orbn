
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810}
.wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:32px;background:#080810;border-radius:20px;padding:40px}
canvas{display:block}
.label{font-family:system-ui,sans-serif;font-size:12px;color:rgba(201,169,110,0.5);letter-spacing:.1em;text-transform:uppercase}
.size-row{display:flex;gap:12px}
.size-btn{padding:7px 16px;background:rgba(201,169,110,0.08);border:0.5px solid rgba(201,169,110,0.25);border-radius:100px;font-family:system-ui,sans-serif;font-size:12px;color:rgba(201,169,110,0.7);cursor:pointer;transition:all .2s}
.size-btn:hover,.size-btn.active{background:rgba(201,169,110,0.18);border-color:rgba(201,169,110,0.5);color:#C9A96E}
</style>

<div class="wrap">
  <div class="size-row">
    <button class="size-btn" onclick="setSize(120)">S</button>
    <button class="size-btn active" onclick="setSize(200)">M</button>
    <button class="size-btn" onclick="setSize(280)">L</button>
  </div>
  <canvas id="orb" width="200" height="200"></canvas>
  <div class="label">Memory Orb — FlutterFlow Widget</div>
</div>

<script>
const GOLD = [201, 169, 110];
let SIZE = 200;
let canvas = document.getElementById('orb');
let ctx = canvas.getContext('2d');

// Angles
let orbitAngle = 0;
let orbitSlowAngle = 0;
let dashAngle = 0;
let pulseT = 0;
let dotT = 0;

function setSize(s) {
  SIZE = s;
  canvas.width = s;
  canvas.height = s;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function gold(opacity) {
  return `rgba(${GOLD[0]},${GOLD[1]},${GOLD[2]},${opacity})`;
}

function drawRing(cx, cy, r, opacity, lw) {
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = gold(opacity);
  ctx.lineWidth = lw;
  ctx.stroke();
}

function drawDashed(cx, cy, r, opacity, dashLen, gapLen, angle) {
  const circ = 2 * Math.PI * r;
  const total = dashLen + gapLen;
  const count = Math.floor(circ / total);
  const sweep = (dashLen / total) * (Math.PI * 2 / count);

  ctx.strokeStyle = gold(opacity);
  ctx.lineWidth = 0.5;
  ctx.lineCap = 'round';
  for (let i = 0; i < count; i++) {
    const start = angle + (i / count) * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, start, start + sweep);
    ctx.stroke();
  }
}

function drawOrbitNodes(cx, cy, orbitR, angle, count, baseOff, sizes, opacities) {
  for (let i = 0; i < count; i++) {
    const a = angle + baseOff + (2 * Math.PI / count) * i;
    const nx = cx + orbitR * Math.cos(a);
    const ny = cy + orbitR * Math.sin(a);
    ctx.beginPath();
    ctx.arc(nx, ny, sizes[i], 0, Math.PI * 2);
    ctx.fillStyle = gold(opacities[i]);
    ctx.fill();
  }
}

function draw(ts) {
  const S = SIZE;
  const cx = S / 2, cy = S / 2, r = S / 2;

  ctx.clearRect(0, 0, S, S);

  const t = ts / 1000;
  orbitAngle = (t / 12) * Math.PI * 2;
  orbitSlowAngle = -(t / 22) * Math.PI * 2;
  dashAngle = (t / 14) * Math.PI * 2;
  const pulse = 0.93 + 0.14 * (0.5 + 0.5 * Math.sin(t * Math.PI / 2));
  const dotOp = 0.6 + 0.4 * (0.5 + 0.5 * Math.sin(t * Math.PI));

  // Glow
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 0.92);
  grd.addColorStop(0, gold(0.12));
  grd.addColorStop(1, gold(0));
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.92, 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();

  // Static rings
  drawRing(cx, cy, r * 0.88, 0.10, 0.5);
  drawRing(cx, cy, r * 0.73, 0.17, 0.5);

  // Dashed rotating ring
  drawDashed(cx, cy, r * 0.60, 0.22, 14, 22, dashAngle);

  // Inner ring
  drawRing(cx, cy, r * 0.45, 0.32, 0.75);

  // Pulsing center
  const innerR = r * 0.29 * pulse;
  ctx.beginPath();
  ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
  ctx.fillStyle = gold(0.08);
  ctx.fill();
  drawRing(cx, cy, innerR, 0.35 + 0.25 * (pulse - 0.93) / 0.14, 0.75);

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.052, 0, Math.PI * 2);
  ctx.fillStyle = gold(dotOp * 0.9);
  ctx.fill();

  // 3 orbit nodes (medium ring)
  drawOrbitNodes(cx, cy, r * 0.60, orbitAngle, 3, 0, [3.5, 2.5, 2.0], [0.7, 0.5, 0.35]);

  // 2 slow orbit nodes (outer ring)
  drawOrbitNodes(cx, cy, r * 0.84, orbitSlowAngle, 2, Math.PI/4, [2.0, 1.5], [0.20, 0.15]);

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
