
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:transparent}
canvas{display:block;margin:auto}
</style>
</head>
<body>
<canvas id="orb" width="200" height="200"></canvas>
<script>
const GOLD=[201,169,110];
const S=200;
const canvas=document.getElementById('orb');
const ctx=canvas.getContext('2d');

function gold(o){return `rgba(${GOLD[0]},${GOLD[1]},${GOLD[2]},${o})`}

function drawRing(cx,cy,r,op,lw){
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle=gold(op);ctx.lineWidth=lw;ctx.stroke();
}

function drawDashed(cx,cy,r,op,dashLen,gapLen,angle){
  const circ=2*Math.PI*r,total=dashLen+gapLen;
  const count=Math.floor(circ/total);
  const sweep=(dashLen/total)*(Math.PI*2/count);
  ctx.strokeStyle=gold(op);ctx.lineWidth=0.5;ctx.lineCap='round';
  for(let i=0;i<count;i++){
    const start=angle+(i/count)*Math.PI*2;
    ctx.beginPath();ctx.arc(cx,cy,r,start,start+sweep);ctx.stroke();
  }
}

function drawNodes(cx,cy,oR,angle,count,off,sizes,ops){
  for(let i=0;i<count;i++){
    const a=angle+off+(2*Math.PI/count)*i;
    ctx.beginPath();ctx.arc(cx+oR*Math.cos(a),cy+oR*Math.sin(a),sizes[i],0,Math.PI*2);
    ctx.fillStyle=gold(ops[i]);ctx.fill();
  }
}

function draw(ts){
  const cx=S/2,cy=S/2,r=S/2,t=ts/1000;
  ctx.clearRect(0,0,S,S);
  const oA=(t/12)*Math.PI*2,oS=-(t/22)*Math.PI*2,dA=(t/14)*Math.PI*2;
  const pulse=0.93+0.14*(0.5+0.5*Math.sin(t*Math.PI/2));
  const dotOp=0.6+0.4*(0.5+0.5*Math.sin(t*Math.PI));
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,r*0.92);
  grd.addColorStop(0,gold(0.12));grd.addColorStop(1,gold(0));
  ctx.beginPath();ctx.arc(cx,cy,r*0.92,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
  drawRing(cx,cy,r*0.88,0.10,0.5);
  drawRing(cx,cy,r*0.73,0.17,0.5);
  drawDashed(cx,cy,r*0.60,0.22,14,22,dA);
  drawRing(cx,cy,r*0.45,0.32,0.75);
  const iR=r*0.29*pulse;
  ctx.beginPath();ctx.arc(cx,cy,iR,0,Math.PI*2);ctx.fillStyle=gold(0.08);ctx.fill();
  drawRing(cx,cy,iR,0.35+0.25*(pulse-0.93)/0.14,0.75);
  ctx.beginPath();ctx.arc(cx,cy,r*0.052,0,Math.PI*2);ctx.fillStyle=gold(dotOp*0.9);ctx.fill();
  drawNodes(cx,cy,r*0.60,oA,3,0,[3.5,2.5,2.0],[0.7,0.5,0.35]);
  drawNodes(cx,cy,r*0.84,oS,2,Math.PI/4,[2.0,1.5],[0.20,0.15]);
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
